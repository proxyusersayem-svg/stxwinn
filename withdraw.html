<main class="content-wrapper withdraw-wrapper">
    <section class="glass-card form-section">
        <h2 class="gold-gradient-text" style="margin-bottom: 10px;">Request Cashout</h2>
        
        <div class="withdraw-limits-badge">
            <span>Minimum: <strong>1,000 BDT</strong></span>
            <span>Fee: <strong>0.00%</strong></span>
        </div>

        <form id="withdraw-form" class="transaction-form">
            <div class="form-group">
                <label>Select Payment Gateway</label>
                <div class="gateway-selector-grid">
                    <div class="gateway-option active" data-gateway="bKash">
                        <i class="fas fa-mobile-alt"></i>
                        <span class="gateway-label">bKash Personal</span>
                    </div>
                    <div class="gateway-option" data-gateway="Nagad">
                        <i class="fas fa-coins"></i>
                        <span class="gateway-label">Nagad Personal</span>
                    </div>
                </div>
                <input type="hidden" id="withdraw-method-selected" value="bKash">
            </div>

            <div class="form-group">
                <label id="destination-field-label">bKash Personal Mobile Number</label>
                <input type="text" id="withdraw-destination" placeholder="e.g. 01XXXXXXXXX" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Cashout Amount (BDT)</label>
                <div class="input-with-suffix">
                    <input type="number" id="withdraw-amount-bdt" min="1000" value="1200" class="form-control" required>
                    <span class="input-suffix">BDT</span>
                </div>
                <small class="conversion-info">Required Wallet Balance Debit: ≈ <strong id="usd-cost-equivalent">10.00</strong> USD</small>
            </div>

            <button type="submit" class="btn btn-gold btn-full">Initiate Extraction</button>
        </form>
    </section>
</main>
<link rel="stylesheet" href="css/withdraw.css">
