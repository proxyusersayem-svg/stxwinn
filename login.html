<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STX WIN - Luxury Portal Access</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-container glass-card">
        <div class="auth-header">
            <h1 class="gold-gradient-text">STX WIN</h1>
            <p>Access your premium gaming portal</p>
        </div>
        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter secure password" required>
            </div>
            <button type="submit" class="btn btn-gold btn-full">Unlock Account</button>
        </form>
        <div class="auth-footer">
            <p>New to the luxury club? <a href="signup.html" class="gold-link">Register VIP Account</a></p>
        </div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/notification.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
