<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STX WIN - Elite Wallet</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/wallet.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <header class="main-header glass-effect">
        <a href="index.html" class="logo gold-gradient-text">STX WIN</a>
        <nav class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="dashboard.html"><i class="fas fa-gamepad"></i> Lobby</a>
            <a href="wallet.html" class="active"><i class="fas fa-wallet"></i> Wallet</a>
            <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
        </nav>
    </header>

    <main class="content-wrapper">
        <section class="wallet-overview glass-card">
            <h2>Luxury Reserve Balance</h2>
            <div class="luxury-balance-container">
                <span class="currency-symbol">$</span>
                <span class="huge-balance" id="wallet-balance-display">0.00</span>
            </div>
            <div class="wallet-actions">
                <a href="deposit.html" class="btn btn-gold"><i class="fas fa-arrow-down"></i> Deposit Reserves</a>
                <a href="withdraw.html" class="btn btn-outline-gold"><i class="fas fa-arrow-up"></i> Cashout Funds</a>
            </div>
        </section>

        <section class="recent-transactions glass-card">
            <div class="section-title-row">
                <h3>Recent Capital Logs</h3>
                <a href="history.html" class="gold-link">View Full Ledger</a>
            </div>
            <div class="history-list" id="brief-transaction-history">
                <!-- Javascript maps transactions -->
            </div>
        </section>
    </main>

    <nav class="mobile-nav glass-effect">
        <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="dashboard.html"><i class="fas fa-gamepad"></i><span>Lobby</span></a>
        <a href="wallet.html" class="active"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="profile.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <div id="toast-container" class="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/notification.js"></script>
    <script src="js/wallet.js"></script>
</body>
</html>
